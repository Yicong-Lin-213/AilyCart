name: EAS Update
on:
  push:
    branches:
      - main  # triggered when pushing to main branch, you can change this to any branch you want

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache-dependency-path: './AilyCartApp/package-lock.json'
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        working-directory: ./AilyCartApp
        run: npm install

      - name: 🚀 Publish Update
        working-directory: ./AilyCartApp
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          eas update --platform android --branch production --message "Build: ${{ github.sha }}"
          eas update --platform ios --branch production --message "Build: ${{ github.sha }}"